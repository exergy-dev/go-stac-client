name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - run: go mod download

      - run: go vet ./...

      - run: go build ./...

      - run: go test -short -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
      - name: Fuzz STAC unmarshal targets (smoke)
        run: |
          for target in FuzzItemUnmarshal FuzzCollectionUnmarshal FuzzCatalogUnmarshal FuzzLinkUnmarshal; do
            go test -run=^$ -fuzz=^$target$ -fuzztime=20s ./pkg/stac/
          done
